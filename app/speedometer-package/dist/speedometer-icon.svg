<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="gaugeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="50%" style="stop-color:#eab308"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bgGradient)"/>
  
  <!-- Outer ring -->
  <circle cx="256" cy="280" r="160" fill="#1e293b" stroke="#334155" stroke-width="8"/>
  
  <!-- Inner ring -->
  <circle cx="256" cy="280" r="140" fill="#0f172a"/>
  
  <!-- Gauge arc background -->
  <path d="M 120 320 A 160 160 0 1 1 392 320" 
        fill="none" 
        stroke="#334155" 
        stroke-width="20" 
        stroke-linecap="round"/>
  
  <!-- Gauge arc active -->
  <path d="M 120 320 A 160 160 0 1 1 392 320" 
        fill="none" 
        stroke="url(#gaugeGradient)" 
        stroke-width="20" 
        stroke-linecap="round"
        stroke-dasharray="500"
        stroke-dashoffset="200"
        filter="url(#glow)"/>
  
  <!-- Tick marks -->
  <g stroke="#64748b" stroke-width="4" stroke-linecap="round">
    <line x1="256" y1="120" x2="256" y2="140"/>
    <line x1="376" y1="200" x2="360" y2="215"/>
    <line x1="416" y1="320" x2="396" y2="320"/>
    <line x1="376" y1="440" x2="360" y2="425"/>
    <line x1="136" y1="200" x2="152" y2="215"/>
  </g>
  
  <!-- Needle -->
  <line x1="256" y1="320" x2="320" y2="200" 
        stroke="#f8fafc" 
        stroke-width="8" 
        stroke-linecap="round"
        filter="url(#glow)"/>
  
  <!-- Center dot -->
  <circle cx="256" cy="320" r="16" fill="#f8fafc"/>
  
  <!-- Speed text -->
  <text x="256" y="380" 
        text-anchor="middle" 
        fill="#f8fafc" 
        font-family="Arial, sans-serif" 
        font-size="48" 
        font-weight="bold">120</text>
  
  <!-- Unit text -->
  <text x="256" y="410" 
        text-anchor="middle" 
        fill="#94a3b8" 
        font-family="Arial, sans-serif" 
        font-size="20">km/h</text>
</svg>
